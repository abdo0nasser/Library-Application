name: ci workflow

on:
    push:
        branches: ["*"]
    pull_request:
        branches: ["master"]

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            - run: npm ci

            - name: Lint backend
              run: npm run lint --workspace=backend

            - name: Lint frontend
              run: npm run lint --workspace=frontend

    build:
        runs-on: ubuntu-latest
        needs: lint
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            - run: npm ci

            - name: Generate Prisma client
              working-directory: backend
              run: npx prisma generate

            - name: Build all workspaces
              run: npm run build

            - uses: actions/upload-artifact@v4
              with:
                  name: frontend-dist
                  path: frontend/dist

            - uses: actions/upload-artifact@v4
              with:
                  name: backend-dist
                  path: backend/dist

    docker-test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v4

            - name: Setup env for Docker
              run: cp backend/.env.example backend/.env

            - name: Run Docker Compose (wait for healthchecks)
              run: docker compose up -d --build --wait

            - name: Wait for containers
              run: sleep 3

            - name: Check running containers
              run: docker compose ps -a

            - name: Verify API health endpoint
              run: curl -sf http://localhost:3000/api/health || (docker compose logs --tail=30 nest-server && exit 1)

            - name: Check logs if failed
              if: failure()
              run: docker compose logs

            - name: Shutdown
              if: always()
              run: docker compose down
